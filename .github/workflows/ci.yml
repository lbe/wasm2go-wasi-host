name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            runs-on: ubuntu-latest
          - id: macos
            runs-on: macos-latest
          - id: linux-arm
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pytest
        run: python3 -m pip install --break-system-packages pytest

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true

      - name: Install wasm2go
        run: go install github.com/ncruces/wasm2go@v0.4.2

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./... -timeout 15m

  test-linux-other:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubuntu-24.04-riscv
          - ubuntu-24.04-s390x
          - ubuntu-24.04-ppc64le-p10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pytest
        run: python3 -m pip install --break-system-packages pytest

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true

      - name: Install wasm2go
        run: go install github.com/ncruces/wasm2go@v0.4.2

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./... -timeout 15m

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Generate Changelog
        id: changelog
        run: |
          git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD > /tmp/changelog.txt || echo "Initial release" > /tmp/changelog.txt
          cat /tmp/changelog.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
